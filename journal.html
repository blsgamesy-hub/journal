<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나 발견 일지</title>
<link rel="manifest" href="./manifest_journal.json">
<meta name="theme-color" content="#f5f2ed">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="발견일지">
<link rel="apple-touch-icon" href="./journal_icon.png">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&family=Noto+Serif+KR:wght@500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f2ed;
  --paper: #fdfcf9;
  --ink: #2a2420;
  --ink-mid: #5a524c;
  --ink-light: #8a7e78;
  --ink-faint: #c4b8b0;
  --line: #e8e0d8;
  --c-find: #4a7a4a;
  --c-obs: #4a628a;
  --c-try: #8a5a3a;
  --bg-find: #f0f5f0;
  --bg-obs: #f0f2f7;
  --bg-try: #f7f2ee;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  color: var(--ink);
  padding-bottom: 100px;
}

/* 헤더 */
.header {
  max-width: 640px; margin: 0 auto;
  padding: 40px 24px 0;
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 8px;
}
.header-left {}
.app-title {
  font-family: 'Gowun Batang', serif;
  font-size: 26px; font-weight: 700;
  letter-spacing: -0.5px;
}
.app-sub { font-size: 11px; color: var(--ink-light); margin-top: 3px; letter-spacing: 0.3px; }
.header-btns { display: flex; gap: 2px; align-items: center; flex-wrap: nowrap; flex-shrink: 0; }
.hbtn {
  background: none; border: none;
  padding: 6px; cursor: pointer;
  color: var(--ink-faint); border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  transition: color .15s, background .15s;
}
.hbtn:hover { color: var(--ink-light); background: rgba(0,0,0,0.04); }

/* 탭 */
.tabs {
  max-width: 640px; margin: 20px auto 0;
  padding: 0 24px;
  display: flex; gap: 0;
  border-bottom: 1px solid var(--line);
}
.tab {
  padding: 9px 16px; font-size: 13px;
  color: var(--ink-light); cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px; transition: all .18s;
}
.tab:hover { color: var(--ink); }
.tab.active { color: var(--ink); border-bottom-color: var(--ink); font-weight: 500; }
.tab.active.t-find { color: var(--c-find); border-bottom-color: var(--c-find); }
.tab.active.t-obs  { color: var(--c-obs);  border-bottom-color: var(--c-obs); }
.tab.active.t-try  { color: var(--c-try);  border-bottom-color: var(--c-try); }

/* 리스트 */
.list-wrap {
  max-width: 640px; margin: 16px auto 0;
  padding: 0 24px;
  display: flex; flex-direction: column; gap: 10px;
}
.empty { text-align: center; padding: 60px 0; font-size: 13px; color: var(--ink-faint); }

/* 카드 */
.card {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 16px 18px;
  cursor: pointer;
  transition: box-shadow .15s, border-color .15s;
  position: relative;
}
.card:hover { box-shadow: 0 2px 14px rgba(0,0,0,0.07); border-color: var(--ink-faint); }
.card-accent {
  position: absolute; left: 0; top: 12px; bottom: 12px;
  width: 3px; border-radius: 0 2px 2px 0;
}
.acc-find { background: var(--c-find); }
.acc-obs  { background: var(--c-obs); }
.acc-try  { background: var(--c-try); }

.card-inner { padding-left: 12px; }
.card-badge {
  display: inline-block; font-size: 10px;
  padding: 2px 8px; border-radius: 8px;
  font-weight: 500; margin-bottom: 7px;
}
.badge-find { background: var(--bg-find); color: var(--c-find); }
.badge-obs  { background: var(--bg-obs);  color: var(--c-obs); }
.badge-try  { background: var(--bg-try);  color: var(--c-try); }

.card-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 15px; line-height: 1.55; font-weight: 500;
  color: var(--ink); margin-bottom: 8px;
}
.card-footer {
  display: flex; align-items: center; gap: 10px;
}
.card-date { font-size: 11px; color: var(--ink-faint); }
.card-counts { font-size: 11px; color: var(--ink-faint); display: flex; gap: 8px; }

/* FAB */
.fab {
  position: fixed; bottom: 28px;
  left: 50%; transform: translateX(-50%);
  background: var(--ink); color: #fff;
  border: none; border-radius: 24px;
  padding: 13px 28px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px; cursor: pointer;
  box-shadow: 0 4px 20px rgba(0,0,0,0.22);
  transition: transform .15s, box-shadow .15s;
  z-index: 50; white-space: nowrap;
}
.fab:hover { transform: translateX(-50%) translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,0.28); }

/* 오버레이 */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(42,36,32,0.45);
  z-index: 200; align-items: flex-end; justify-content: center;
}
.overlay.open { display: flex; }

/* 바텀시트 */
.sheet {
  background: var(--paper);
  border-radius: 20px 20px 0 0;
  width: 100%; max-width: 640px;
  max-height: 92vh; overflow-y: auto;
  padding: 20px 24px 44px;
  animation: slideUp .22s ease;
}
@keyframes slideUp {
  from { transform: translateY(24px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
.sheet-handle {
  width: 32px; height: 4px;
  background: var(--ink-faint); border-radius: 2px;
  margin: 0 auto 18px;
}
.sheet-title {
  font-family: 'Gowun Batang', serif;
  font-size: 20px; margin-bottom: 18px; font-weight: 700;
}

/* 타입 선택 */
.type-row { display: flex; gap: 8px; margin-bottom: 20px; }
.type-btn {
  flex: 1; padding: 9px 4px;
  border: 1.5px solid var(--line);
  border-radius: 9px; background: transparent;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px; color: var(--ink-light);
  cursor: pointer; transition: all .15s;
}
.type-btn.sel-find { background: var(--bg-find); border-color: var(--c-find); color: var(--c-find); font-weight: 500; }
.type-btn.sel-obs  { background: var(--bg-obs);  border-color: var(--c-obs);  color: var(--c-obs);  font-weight: 500; }
.type-btn.sel-try  { background: var(--bg-try);  border-color: var(--c-try);  color: var(--c-try);  font-weight: 500; }

/* 폼 필드 */
.field-group { margin-bottom: 18px; }
.field-label {
  font-size: 11px; color: var(--ink-light);
  letter-spacing: 0.4px; margin-bottom: 5px;
}
.field-opt { color: var(--ink-faint); font-size: 10px; }
.field-input {
  width: 100%; background: transparent;
  border: none; border-bottom: 1.5px solid var(--line);
  padding: 7px 0; font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px; color: var(--ink); outline: none;
}
.field-input:focus { border-bottom-color: var(--ink); }
.field-input::placeholder { color: var(--ink-faint); }
.field-textarea {
  width: 100%; background: transparent;
  border: none; border-bottom: 1.5px solid var(--line);
  padding: 7px 0; font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px; color: var(--ink); outline: none;
  resize: none; min-height: 64px; line-height: 1.7;
}
.field-textarea:focus { border-bottom-color: var(--ink); }
.field-textarea::placeholder { color: var(--ink-faint); }

/* 자동 생성 제목 미리보기 */
.title-preview {
  background: var(--bg); border-radius: 8px;
  padding: 10px 14px; margin-bottom: 18px;
  font-family: 'Gowun Batang', serif;
  font-size: 14px; color: var(--ink-mid); font-weight: 700;
  line-height: 1.6; min-height: 40px;
  border: 1px solid var(--line);
}
.title-preview-label { font-size: 10px; color: var(--ink-faint); margin-bottom: 4px; font-family: 'Noto Sans KR', sans-serif; }

.form-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
.btn-cancel {
  background: none; border: 1px solid var(--line);
  border-radius: 8px; padding: 9px 18px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px; color: var(--ink-light); cursor: pointer;
}
.btn-save {
  background: var(--ink); color: #fff;
  border: none; border-radius: 8px;
  padding: 9px 22px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px; cursor: pointer;
}
.btn-save:hover { opacity: 0.85; }

/* 상세 뷰 */
.detail-view {
  display: none; position: fixed; inset: 0;
  background: var(--bg); z-index: 300;
  overflow-y: auto;
}
.detail-view.open { display: block; }
.detail-inner { max-width: 640px; margin: 0 auto; padding: 20px 24px 80px; }
.back-btn {
  background: none; border: none;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px; color: var(--ink-light);
  cursor: pointer; padding: 6px 0; margin-bottom: 18px;
  display: flex; align-items: center; gap: 4px;
}
.back-btn:hover { color: var(--ink); }

.detail-badge {
  display: inline-block; font-size: 11px;
  padding: 3px 10px; border-radius: 10px;
  font-weight: 500; margin-bottom: 10px;
}
.detail-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 17px; line-height: 1.55; font-weight: 500;
  margin-bottom: 6px;
}
.detail-date { font-size: 11px; color: var(--ink-faint); margin-bottom: 22px; }

/* 필드 표시 */
.detail-fields { margin-bottom: 20px; }
.dfield {
  padding: 10px 0;
  border-bottom: 1px dashed var(--line);
}
.dfield:last-child { border-bottom: none; }
.dfield-label { font-size: 11px; color: var(--ink-light); display: block; margin-bottom: 3px; }
.dfield-val { font-size: 14px; color: var(--ink); line-height: 1.6; white-space: pre-wrap; display: block; }
.dfield-val.empty { color: var(--ink-faint); font-size: 13px; white-space: normal; }

.detail-actions {
  display: flex; gap: 8px; justify-content: flex-end;
  padding: 12px 0 20px; border-bottom: 1px solid var(--line);
  margin-bottom: 24px;
}
.act-btn {
  background: none; border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 14px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px; color: var(--ink-light); cursor: pointer;
}
.act-btn:hover { background: var(--bg); }
.act-btn.del { color: #b05050; border-color: #e0c0c0; }
.act-btn.del:hover { background: #fdf0f0; }
.act-btn.retry { font-weight: 500; }

/* 재시도/재관찰 섹션 */
.retries-section { margin-bottom: 24px; }
.retries-title {
  font-size: 12px; font-weight: 500; color: var(--ink-light);
  letter-spacing: 0.5px; margin-bottom: 14px;
}
.retry-card {
  background: var(--paper); border: 1px solid var(--line);
  border-radius: 8px; padding: 14px 16px; margin-bottom: 10px;
  position: relative;
}
.retry-num {
  font-size: 10px; color: var(--ink-faint);
  margin-bottom: 8px; font-weight: 500;
}
.retry-del {
  position: absolute; top: 10px; right: 12px;
  background: none; border: none;
  font-size: 12px; color: var(--ink-faint);
  cursor: pointer; opacity: 0; transition: opacity .15s;
}
.retry-card:hover .retry-del { opacity: 1; }
.retry-del:hover { color: #b05050; }

/* 덧붙이기 */
.comments-section {}
.comments-title {
  font-size: 12px; font-weight: 500; color: var(--ink-light);
  letter-spacing: 0.5px; margin-bottom: 14px;
}
.comment-item {
  padding: 12px 0; border-bottom: 1px dashed var(--line);
  position: relative;
}
.comment-date { font-size: 11px; color: var(--ink-faint); margin-bottom: 5px; }
.comment-body { font-size: 14px; line-height: 1.7; white-space: pre-wrap; }
.comment-form { margin-top: 16px; display: flex; flex-direction: column; }
.comment-textarea {
  width: 100%; background: transparent;
  border: none; border-bottom: 1.5px solid var(--line);
  padding: 7px 0; font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px; color: var(--ink); outline: none;
  resize: none; min-height: 56px; line-height: 1.7;
}
.comment-textarea:focus { border-bottom-color: var(--ink); }
.comment-textarea::placeholder { color: var(--ink-faint); }
.comment-submit {
  align-self: flex-end; margin-top: 10px;
  background: none; border: 1px solid var(--ink-faint);
  border-radius: 8px; padding: 6px 16px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px; color: var(--ink-light); cursor: pointer;
}
.comment-submit:hover { background: var(--ink); color: #fff; border-color: var(--ink); }

/* 재시도 폼 오버레이 */
.retry-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(42,36,32,0.45);
  z-index: 400; align-items: flex-end; justify-content: center;
}
.retry-overlay.open { display: flex; }

.hidden { display: none; }

/* 시도 스왑 버튼 */
.try-swap-btn {
  display: flex; align-items: center; gap: 5px;
  background: none; border: 1px solid var(--line);
  border-radius: 8px; padding: 4px 12px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 11px; color: var(--ink-light);
  cursor: pointer; margin-bottom: 16px;
  transition: all .15s;
}
.try-swap-btn:hover { border-color: var(--c-try); color: var(--c-try); }

/* 덧붙이기 수정 */
.comment-actions {
  position: absolute; top: 12px; right: 0;
  display: flex; gap: 8px; align-items: center;
  opacity: 0; transition: opacity .15s;
}
.comment-item:hover .comment-actions { opacity: 1; }
.comment-edit-btn {
  background: none; border: none;
  font-size: 12px; color: var(--ink-faint);
  cursor: pointer; padding: 0; line-height: 1;
}
.comment-edit-btn:hover { color: var(--ink-light); }
.comment-del {
  background: none; border: none;
  font-size: 12px; color: var(--ink-faint);
  cursor: pointer; padding: 0;
}
.comment-del:hover { color: #b05050; }
.comment-editing-form {
  margin-top: 8px;
}
.comment-editing-textarea {
  width: 100%; background: var(--bg);
  border: 1px solid var(--line); border-radius: 8px;
  padding: 8px 10px; font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px; color: var(--ink); outline: none;
  resize: none; min-height: 56px; line-height: 1.7;
}
.comment-editing-textarea:focus { border-color: var(--ink-faint); }
.comment-edit-btns { display: flex; gap: 6px; justify-content: flex-end; margin-top: 6px; }
.comment-edit-save {
  background: var(--ink); color: #fff;
  border: none; border-radius: 7px; padding: 5px 14px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px; cursor: pointer;
}
.comment-edit-cancel {
  background: none; border: 1px solid var(--line);
  border-radius: 7px; padding: 5px 14px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px; color: var(--ink-light); cursor: pointer;
}

/* 별 */
.star-btn {
  background: none; border: none;
  cursor: pointer; padding: 4px;
  color: var(--ink-faint);
  display: flex; align-items: center; justify-content: center;
  transition: transform .15s, color .15s;
  border-radius: 50%;
}
.star-btn:hover { transform: scale(1.15); color: var(--ink-light); }
.card-star { font-size: 13px; line-height: 1; }




/* 타입 편집 패널 */
.rtype-edit-btn {
  background: none; border: 1px dashed var(--line);
  border-radius: 8px; padding: 3px 8px;
  font-size: 11px; cursor: pointer; color: var(--ink-faint);
  flex-shrink: 0;
}
.rtype-edit-btn:hover { border-color: var(--ink-faint); color: var(--ink-light); }
.rtype-edit-panel {
  margin-top: 8px; padding: 10px 12px;
  background: var(--bg); border-radius: 8px;
  border: 1px solid var(--line);
}
.rtype-edit-panel-title { font-size:10px; color:var(--ink-faint); margin-bottom:8px; }
.rtype-chips-edit { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:8px; }
.rtype-chip-edit {
  padding: 3px 10px; border-radius:10px;
  border: 1px solid var(--line); background: var(--paper);
  font-size: 12px; color: var(--ink-light);
  display: flex; align-items: center; gap: 4px;
}
.rtype-chip-del { background:none; border:none; cursor:pointer; color:var(--ink-faint); font-size:11px; padding:0; line-height:1; }
.rtype-chip-del:hover { color:#b05050; }
.rtype-add-row { display:flex; gap:6px; }
.rtype-add-input {
  flex:1; background:transparent; border:none;
  border-bottom: 1px solid var(--line);
  padding:4px 0; font-size:13px; color:var(--ink); outline:none;
  font-family: 'Noto Sans KR', sans-serif;
}
.rtype-add-input::placeholder { color:var(--ink-faint); }
.rtype-add-btn {
  background:none; border:1px solid var(--line);
  border-radius:6px; padding:3px 10px;
  font-size:11px; color:var(--ink-light); cursor:pointer;
  font-family: 'Noto Sans KR', sans-serif; white-space:nowrap;
}
.rtype-add-btn:hover { background:var(--ink); color:#fff; border-color:var(--ink); }


/* 결과 블록 */
.result-block {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 12px 14px; margin-bottom: 10px;
  position: relative; background: rgba(255,255,255,0.5);
}
.result-block-num {
  font-size: 10px; color: var(--ink-faint);
  margin-bottom: 8px; font-weight: 500;
}
.result-block-del {
  position: absolute; top: 10px; right: 10px;
  background: none; border: none;
  font-size: 13px; color: var(--ink-faint);
  cursor: pointer;
}
.result-block-del:hover { color: #b05050; }
.add-result-btn {
  width: 100%; padding: 8px;
  background: none; border: 1.5px dashed var(--line);
  border-radius: 8px; cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px; color: var(--ink-light);
  margin-bottom: 4px;
}
.add-result-btn:hover { border-color: var(--ink-faint); color: var(--ink); }
.detail-result-block {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 10px 14px; margin-bottom: 8px;
  background: rgba(255,255,255,0.5);
}


/* 결과 타입/태그 */
.result-type-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.rtype-btn {
  padding: 4px 12px; border-radius: 12px;
  border: 1.5px solid var(--line); background: transparent;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px; color: var(--ink-light); cursor: pointer; transition: all .15s;
}
.rtype-btn.sel { background: var(--ink); color: #fff; border-color: var(--ink); }
.tag-pool { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.tag-chip {
  padding: 4px 12px; border-radius: 12px;
  border: 1.5px solid var(--line); background: transparent;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px; color: var(--ink-light); cursor: pointer; transition: all .15s;
}
.tag-chip.sel { border-color: var(--c-find); background: var(--bg-find); color: var(--c-find); font-weight: 500; }
.tag-add-row { display: flex; gap: 6px; align-items: center; margin-top: 4px; }
.tag-add-input {
  flex: 1; background: transparent; border: none;
  border-bottom: 1.5px solid var(--line);
  padding: 4px 0; font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px; color: var(--ink); outline: none;
}
.tag-add-input:focus { border-bottom-color: var(--ink); }
.tag-add-input::placeholder { color: var(--ink-faint); }
.tag-add-btn {
  background: none; border: 1px solid var(--line);
  border-radius: 7px; padding: 4px 12px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px; color: var(--ink-light); cursor: pointer; white-space: nowrap;
}
.tag-add-btn:hover { background: var(--ink); color: #fff; border-color: var(--ink); }
/* 검색바 */
.search-wrap {
  max-width: 640px; margin: 14px auto 0; padding: 0 24px;
}
.search-input {
  width: 100%; background: var(--paper);
  border: 1px solid var(--line); border-radius: 8px;
  padding: 9px 14px; font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px; color: var(--ink); outline: none;
}
.search-input:focus { border-color: var(--ink-faint); }
.search-input::placeholder { color: var(--ink-faint); }
.tag-filter-wrap {
  max-width: 640px; margin: 10px auto 0; padding: 0 24px;
  display: flex; gap: 6px; flex-wrap: wrap;
}
.filter-tag {
  padding: 4px 12px; border-radius: 12px;
  border: 1.5px solid var(--line); background: var(--paper);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px; color: var(--ink-light); cursor: pointer; transition: all .15s;
}

}

.sync-dot.offline { background: #aaa; }

<script>
(function(){
  // ── 상태 변수 ──
  var entries = [];
  var idc = 1;
  var currentTab = 'all';
  var editingId = null;
  var viewingId = null;
  var selectedType = 'find';
  var tagPool = ['행복함','무기력','불안','설렘','뿌듯함','짜증','평온','두려움'];
  var selectedTags = [];
  var selectedTryTags = [];
  var filterTag = null;
  var searchQuery = '';
  var resultBlocks = [{id:0, text:'', rtype:'기분'}];
  var obsResultBlocks = [{id:0, text:'', rtype:'기분'}];
  var rbCounter = 1;
  var RTYPES = ['기분','감정','행동','생각','신체반응','상황'];
  var tryFieldOrder = 'A';

  // ── Firebase 상태 ──
  var isLoggedIn = false;
  var currentUid = null;
  var unsubEntries = null;
  var unsubMeta = null;
  var unsubRetries = null;
  var unsubComments = null;
  var editingRetryId = null;

  // ── 유틸 ──
  function pad(n){ return n < 10 ? '0'+n : ''+n; }
  function fmt(ts){
    var d = new Date(ts);
    return d.getFullYear()+'년 '+pad(d.getMonth()+1)+'월 '+pad(d.getDate())+'일 '+pad(d.getHours())+':'+pad(d.getMinutes());
  }
  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function showToast(msg){
    var t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(function(){ t.classList.remove('show'); }, 2500);
  }
  function showConfirm(onYes){
    var bar = document.getElementById('confirm-bar');
    bar.classList.add('show');
    document.getElementById('confirm-yes').onclick = function(){ bar.classList.remove('show'); onYes(); };
    document.getElementById('confirm-no').onclick = function(){ bar.classList.remove('show'); };
  }

  // ── 동기화 인디케이터 ──
  function setSyncStatus(status, label){
    var ind = document.getElementById('sync-indicator');
    var dot = document.getElementById('sync-dot');
    var lbl = document.getElementById('sync-label');
    ind.style.display='flex';
    if(!isLoggedIn){
      dot.className = 'sync-dot offline';
      lbl.textContent = '';
      return;
    }
    dot.className = 'sync-dot ' + (status||'');
    lbl.textContent = label||'';
  }

  // ── 비로그인 저장/불러오기 ──
  function autoSave(){
    if(isLoggedIn) return;
    try{ localStorage.setItem('journal_v2', JSON.stringify({entries:entries,idc:idc,tagPool:tagPool,RTYPES:RTYPES})); }catch(e){}
  }
  function autoLoad(){
    if(isLoggedIn) return;
    try{
      var raw = localStorage.getItem('journal_v2'); if(!raw) return;
      var data = JSON.parse(raw);
      if(data.entries) entries = data.entries;
      if(data.idc) idc = data.idc;
      if(data.tagPool) tagPool = data.tagPool;
      if(data.RTYPES) RTYPES = data.RTYPES;
    }catch(e){}
  }
  function getLocalEntries(){
    try{
      var raw = localStorage.getItem('journal_v2'); if(!raw) return [];
      return JSON.parse(raw).entries || [];
    }catch(e){ return []; }
  }

  // ── JSON 백업 (로그인/비로그인 공통) ──
  function triggerDownload(filename){
    var blob = new Blob([JSON.stringify({entries:entries,idc:idc,tagPool:tagPool,RTYPES:RTYPES},null,2)],{type:'application/json'});
    var a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = filename; a.click();
  }

  document.getElementById('save-btn').addEventListener('click', function(){
    var now = new Date();
    var ts = now.getFullYear()+pad(now.getMonth()+1)+pad(now.getDate())+'_'+pad(now.getHours())+pad(now.getMinutes());
    triggerDownload('발견일지_'+ts+'.json');
  });
  document.getElementById('load-btn').addEventListener('click', function(){
    document.getElementById('file-input').click();
  });
  document.getElementById('file-input').addEventListener('change', function(e){
    var file = e.target.files[0]; if(!file) return;
    var reader = new FileReader();
    reader.onload = function(ev){
      try{
        var data = JSON.parse(ev.target.result);
        if(data.entries) entries = data.entries;
        if(data.idc) idc = data.idc;
        if(data.tagPool) tagPool = data.tagPool;
        if(data.RTYPES) RTYPES = data.RTYPES;
        if(isLoggedIn){
          // 로그인 상태에서 불러오기 → Firestore에도 반영
          batchWriteEntries(currentUid, entries).then(function(){
            showToast('불러오기 완료! 🌿');
          });
        } else {
          autoSave(); renderList(); showToast('불러오기 완료! 🌿');
        }
        renderList();
      }catch(err){ showToast('파일을 읽을 수 없어요.'); }
    };
    reader.readAsText(file); e.target.value='';
  });

  // ── 인증 ──
  function isStandalonePWA(){
    return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  }

  function updateAuthUI(user){
    var btn = document.getElementById('auth-btn');
    var lbl = document.getElementById('auth-label');
    if(user){
      var inner = '';
      if(user.photoURL){
        inner = '<img class="auth-avatar" src="'+user.photoURL+'" alt=""/>';
      } else {
        var initial = (user.displayName||user.email||'?')[0].toUpperCase();
        inner = '<div class="auth-initial">'+initial+'</div>';

    }

  function doSignIn(){

    var provider = new fb.GoogleAuthProvider();

      fb.signInWithRedirect(fb.auth, provider).catch(function(e){
        if(e.code === 'auth/unauthorized-domain'){

  // ── Firestore 동기화 ──
  function startSync(uid){
    var fb = window.__fb;
    setSyncStatus('pending','동기화 중');

    // entries 구독
    var q = fb.query(fb.collection(fb.db, 'users/'+uid+'/entries'), fb.orderBy('createdAt','desc'));
    unsubEntries = fb.onSnapshot(q, function(snap){
      entries = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
      var hasPending = snap.metadata.hasPendingWrites;
      setSyncStatus(hasPending ? 'pending' : 'synced', hasPending ? '저장 중' : '동기화됨');
      renderList();
    }, function(err){
      console.error('entries 구독 오류:', err);
      setSyncStatus('offline','오류');
    });

    // 메타(tagPool, RTYPES) 구독
    var metaRef = fb.doc(fb.db, 'users/'+uid);
    unsubMeta = fb.onSnapshot(metaRef, function(snap){
      if(snap.exists()){
        var d = snap.data();
        if(d.tagPool) tagPool = d.tagPool;
        if(d.RTYPES) RTYPES = d.RTYPES;
        renderFormTagPool();
        renderTryTagPool();
      }
    });
  }

  function stopSync(){
    if(unsubEntries){ unsubEntries(); unsubEntries = null; }
    if(unsubMeta){ unsubMeta(); unsubMeta = null; }
    stopDetailSync();
  }

  function stopDetailSync(){
    if(unsubRetries){ unsubRetries(); unsubRetries = null; }
    if(unsubComments){ unsubComments(); unsubComments = null; }
  }

  function startDetailSync(uid, entryId){
    stopDetailSync();
    var fb = window.__fb;
    var entryRef = fb.doc(fb.db, 'users/'+uid+'/entries/'+entryId);

    unsubRetries = fb.onSnapshot(fb.collection(entryRef,'retries'), function(snap){
      var entry = entries.find(function(x){ return x.id===entryId; });
      if(!entry) return;
      entry.retries = snap.docs.map(function(d){ return Object.assign({id:d.id},d.data()); })
        .sort(function(a,b){ return a.createdAt - b.createdAt; });
      renderRetries(entry);
    });
    unsubComments = fb.onSnapshot(fb.collection(entryRef,'comments'), function(snap){
      var entry = entries.find(function(x){ return x.id===entryId; });
      if(!entry) return;
      entry.comments = snap.docs.map(function(d){ return Object.assign({id:d.id},d.data()); })
        .sort(function(a,b){ return a.createdAt - b.createdAt; });
      renderComments(entry);
    });
  }

  // ── Firestore 쓰기 헬퍼 ──
  async function fbSaveEntry(newEntry){
    var fb = window.__fb;
    var docRef = fb.doc(fb.collection(fb.db, 'users/'+currentUid+'/entries'));
    var entryWithId = Object.assign({}, newEntry, {id: docRef.id});
    // 낙관적 업데이트
    entries.unshift(entryWithId);
    renderList();
    try{
      var toSave = Object.assign({}, newEntry);
      delete toSave.id; delete toSave.retries; delete toSave.comments;
      toSave.retryCount = 0; toSave.commentCount = 0;
      await fb.setDoc(docRef, toSave);
    } catch(e){
      entries = entries.filter(function(x){ return x.id !== docRef.id; });
      renderList();
      showToast('저장 실패 😢');
      console.error(e);
    }
  }

  async function fbUpdateEntry(entryId, fields){
    var fb = window.__fb;
    var ref = fb.doc(fb.db, 'users/'+currentUid+'/entries/'+entryId);

  async function fbDeleteEntry(entryId){
    var fb = window.__fb;
    var ref = fb.doc(fb.db, 'users/'+currentUid+'/entries/'+entryId);
    try{
      var retriesSnap = await fb.getDocs(fb.collection(ref,'retries'));
      var commentsSnap = await fb.getDocs(fb.collection(ref,'comments'));
      var batch = fb.writeBatch(fb.db);
      retriesSnap.forEach(function(d){ batch.delete(d.ref); });
      commentsSnap.forEach(function(d){ batch.delete(d.ref); });
      batch.delete(ref);
      await batch.commit();
    } catch(e){ showToast('삭제 실패 😢'); console.error(e); }
  }

  async function batchWriteEntries(uid, entriesToWrite){
    var fb = window.__fb;
    var col = fb.collection(fb.db,'users/'+uid+'/entries');
    // 500개 제한 대비 청크 처리
    var chunks = [];
    for(var i=0; i<entriesToWrite.length; i+=400){
      chunks.push(entriesToWrite.slice(i,i+400));
    }
    for(var ci=0; ci<chunks.length; ci++){
      var batch = fb.writeBatch(fb.db);
      chunks[ci].forEach(function(e){
        var ref = fb.doc(col);
        var toSave = Object.assign({}, e);
        var retries = toSave.retries || [];
        var comments = toSave.comments || [];
        delete toSave.id; delete toSave.retries; delete toSave.comments;
        toSave.retryCount = retries.length;
        toSave.commentCount = comments.length;
        batch.set(ref, toSave);
      });
      await batch.commit();
    }
    await fbSaveMeta();
  }

  // ── 마이그레이션 ──
  async function doMigration(uid){
    var fb = window.__fb;
    var localEntries = getLocalEntries();
    var cloudSnap = await fb.getDocs(fb.query(fb.collection(fb.db,'users/'+uid+'/entries')));
    var cloudEmpty = cloudSnap.empty;
    var localEmpty = localEntries.length === 0;

    if(localEmpty && cloudEmpty){
      // 아무것도 없음 — 그냥 시작
      return;
    }
    if(localEmpty && !cloudEmpty){
      // 클라우드만 있음 — 구독 시작 (이미 startSync에서 처리됨)
      return;
    }

    // 로컬에 데이터가 있는 경우 — 자동 백업 먼저
    var now = new Date();
    var ts = now.getFullYear()+pad(now.getMonth()+1)+pad(now.getDate());
    triggerDownload('발견일지_백업_로그인전_'+ts+'.json');
    showToast('로컬 백업 파일을 다운로드했어요 🌿');

    if(!localEmpty && cloudEmpty){
      // 로컬만 있음 — 자동 업로드
      await batchWriteEntries(uid, localEntries);
      localStorage.removeItem('journal_v2');
      showToast('기존 기록을 클라우드에 올렸어요 ☁️');
      return;
    }

    // 양쪽 모두 있음 — 선택 UI
    var cloudCount = cloudSnap.size;
    var localCount = localEntries.length;
    showMigrationSheet(localCount, cloudCount, localEntries, uid);
  }

  function showMigrationSheet(localCount, cloudCount, localEntries, uid){
    var overlay = document.getElementById('migration-overlay');
    document.getElementById('migration-title').textContent = '기록이 두 곳에 있어요';
    document.getElementById('migration-desc').textContent =
      '이 기기에 '+localCount+'개, 클라우드에 '+cloudCount+'개의 기록이 있어요.\n만약을 위해 로컬 백업 파일을 다운로드했어요.';
    var opts = document.getElementById('migration-opts');
    opts.innerHTML =
      '<button class="migration-opt primary" id="mig-merge">병합 (권장)<small>양쪽 기록을 합쳐서 동기화해요</small></button>'+
      '<button class="migration-opt" id="mig-cloud">클라우드 데이터 사용<small>이 기기의 기록은 버려져요</small></button>'+
      '<button class="migration-opt" id="mig-local">이 기기 데이터로 덮어쓰기<small>클라우드 기록은 버려져요</small></button>'+
      '<button class="migration-opt" id="mig-later" style="color:var(--ink-light);">나중에 하기<small>로그아웃 상태로 유지돼요</small></button>';
    overlay.classList.add('open');

    document.getElementById('mig-merge').onclick = async function(){
      overlay.classList.remove('open');
      var fb = window.__fb;
      var cloudSnap = await fb.getDocs(fb.query(fb.collection(fb.db,'users/'+uid+'/entries')));
      var cloudEntries = cloudSnap.docs.map(function(d){ return Object.assign({id:d.id},d.data()); });
      var merged = mergeEntries(localEntries, cloudEntries);
      var toUpload = merged.filter(function(e){
        return !cloudEntries.find(function(c){ return c.id === e.id; });
      });
      if(toUpload.length > 0) await batchWriteEntries(uid, toUpload);
      localStorage.removeItem('journal_v2');
      showToast('병합 완료! 🌿');
    };
    document.getElementById('mig-cloud').onclick = function(){
      overlay.classList.remove('open');
      localStorage.removeItem('journal_v2');
      showToast('클라우드 데이터로 시작해요 ☁️');
    };
    document.getElementById('mig-local').onclick = async function(){
      overlay.classList.remove('open');
      await batchWriteEntries(uid, localEntries);
      localStorage.removeItem('journal_v2');
      showToast('이 기기 데이터를 올렸어요 ✅');
    };
    document.getElementById('mig-later').onclick = function(){
      overlay.classList.remove('open');
      doSignOut();
    };
  }

  function mergeEntries(local, cloud){
    var merged = {};
    function key(e){ return e.createdAt+':'+e.type+':'+(e.title||'').slice(0,20); }
    cloud.forEach(function(e){ merged[key(e)] = e; });
    local.forEach(function(e){
      var k = key(e);
      if(!merged[k]) merged[k] = e;
    });
    return Object.values(merged);
  }

    openWriteSheet(null, type);

    searchQuery = this.value.trim();
    renderList();

  // ── 태그 필터 ──
  function renderTagFilter(){
    var wrap = document.getElementById('tag-filter-wrap');
    if(!wrap) return;
    if(currentTab !== 'find' && currentTab !== 'try'){ wrap.innerHTML=''; return; }
    var allTags = {};
    entries.filter(function(e){ return e.type===currentTab; }).forEach(function(e){
      (e.data && e.data.tags ? e.data.tags : []).forEach(function(t){ allTags[t]=(allTags[t]||0)+1; });
    });
    var tags = Object.keys(allTags);
    if(tags.length===0){ wrap.innerHTML=''; return; }
    var html = '<span style="font-size:11px;color:var(--ink-faint);padding:5px 2px;">태그 필터</span>';
    tags.forEach(function(tag){
      html += '<div class="filter-tag'+(filterTag===tag?' sel':'')+'" data-tag="'+tag+'">'+tag+' <span style="opacity:.6">'+allTags[tag]+'</span></div>';
    });
    wrap.innerHTML = html;
    wrap.querySelectorAll('.filter-tag').forEach(function(chip){
      chip.addEventListener('click', function(){
        filterTag = filterTag===this.getAttribute('data-tag') ? null : this.getAttribute('data-tag');
        renderTagFilter(); renderList();
      });
    });
  }

  // ── 리스트 렌더 ──
  function renderList(){
    var wrap = document.getElementById('list-wrap');
    renderTagFilter();
    var filtered;
    if(currentTab==='starred'){
      filtered = entries.filter(function(e){ return e.starred || (e.retries||[]).some(function(r){ return r.starred; }); });
    } else if(currentTab==='all'){
      filtered = entries;
    } else {
      filtered = entries.filter(function(e){ return e.type===currentTab; });
    }
    if(filterTag) filtered = filtered.filter(function(e){ return (e.data&&e.data.tags||[]).indexOf(filterTag)>=0; });
    if(searchQuery){
      var q = searchQuery.toLowerCase();
      filtered = filtered.filter(function(e){
        if((e.title||'').toLowerCase().indexOf(q)>=0) return true;
        if((e.data&&e.data.tags||[]).some(function(t){ return t.toLowerCase().indexOf(q)>=0; })) return true;
        return false;
      });
    }
    // 최신순 (로그인 시엔 Firestore가 desc로 줌, 비로그인 시엔 역순)
    var sorted = isLoggedIn ? filtered : filtered.slice().reverse();
    if(sorted.length===0){
      wrap.innerHTML='<div class="empty">'+(currentTab==='starred'?'별표한 기록이 없어요 ⭐':'기록이 없어요 🌿')+'</div>';
      return;
    }
    var html='';
    sorted.forEach(function(e){
      var label = e.type==='find'?'패턴 발견':e.type==='obs'?'관찰':'시도';
      var retryCount = (e.retries||[]).length || (e.retryCount||0);
      var commentCount = (e.comments||[]).length || (e.commentCount||0);
      var tags = (e.data&&e.data.tags)||[];
      var tagsHtml = tags.length>0?'<div class="card-tags">'+tags.map(function(t){return'<span class="card-tag">'+esc(t)+'</span>';}).join('')+'</div>':'';
      var hasStar = e.starred || (e.retries||[]).some(function(r){return r.starred;});
      var starHtml = hasStar?'<div style="position:absolute;top:8px;left:8px;font-size:20px;line-height:1;">⭐</div>':'';
      html+='<div class="card" data-id="'+e.id+'" style="position:relative;">'+starHtml+
        '<div class="card-accent acc-'+e.type+'"></div>'+
        '<div class="card-inner">'+
          '<span class="card-badge badge-'+e.type+'">'+label+'</span>'+
          '<div class="card-title">'+esc(e.title||'')+'</div>'+
          tagsHtml+
          '<div class="card-footer">'+
            '<span class="card-date">'+fmt(e.createdAt)+'</span>'+
            '<span class="card-counts">'+
              (retryCount>0?'<span>🔁 '+retryCount+'</span>':'')+
              (commentCount>0?'<span>💬 '+commentCount+'</span>':'')+
            '</span>'+
          '</div>'+
        '</div>'+
      '</div>';
    });
    wrap.innerHTML=html;
    wrap.querySelectorAll('.card').forEach(function(c){
      c.addEventListener('click', function(){
        openDetail(this.getAttribute('data-id'));
      });
    });
  }

  // ── 상세 뷰 ──
  function openDetail(id){
    viewingId = id;
    var e = entries.find(function(x){ return x.id===id; });

    else if(e.type==='obs'){retryBtn.textContent='🔁 재관찰';retryBtn.style.display='';}
    else{retryBtn.style.display='none';}
    var starBtn=document.getElementById('detail-star');
    starBtn.style.display='';
    starBtn.innerHTML=e.starred?'<span style="font-size:18px;line-height:1;">⭐</span>':'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.9 6.4 6.9.9-5 4.7 1.2 6.8L12 17.7l-6 3.1 1.2-6.8-5-4.7 6.9-.9z"/></svg>';
    // 로그인 시 subcollection 구독, 비로그인 시 로컬 데이터
    if(isLoggedIn){
      startDetailSync(currentUid, id);

      renderRetries(e);
      renderComments(e);
    }
    document.getElementById('comment-input').value='';

    dv.style.display='block'; dv.classList.add('open');
    window.scrollTo(0,0);
    history.pushState({detail:id},'');

  function renderDetailFields(e){
    var html='';
    function row(label,val){
      var trimmed=(val||'').trim(); if(!trimmed) return '';
      return '<div class="dfield"><div class="dfield-label">'+label+'</div><div class="dfield-val">'+esc(trimmed)+'</div></div>';
    }
    if(e.type==='find'){
      html+=row('대상',e.data&&e.data.subject);
      html+=row('조건',e.data&&e.data.condition);
      var results=(e.data&&e.data.results)||(e.data&&e.data.behavior?[{text:e.data.behavior,rtype:e.data.rtype||''}]:[]);
      if(results.length>0){
        html+='<div class="dfield"><div class="dfield-label">결과</div><div class="dfield-val">';
        results.forEach(function(r){
          html+='<div class="detail-result-block">';
          if(r.rtype) html+='<span style="font-size:10px;color:var(--ink-faint);display:block;margin-bottom:3px;">'+esc(r.rtype)+'</span>';
          html+=esc(r.text||'')+'</div>';
        });
        html+='</div></div>';
      }
      if(e.data&&e.data.tags&&e.data.tags.length>0){
        html+='<div class="dfield"><div class="dfield-label">태그</div><div class="dfield-val"><div class="card-tags">'+e.data.tags.map(function(t){return'<span class="card-tag">'+esc(t)+'</span>';}).join('')+'</div></div></div>';
      }
    } else if(e.type==='obs'){
      html+=row('관찰 대상',e.data&&e.data.obs_subject);
      html+=row('관찰 조건',e.data&&e.data.obs_condition);
      html+=row('세부 조건',e.data&&(e.data.obs_sub_condition||e.data.obs_period));
      html+=row('관찰 행동',e.data&&e.data.obs_behavior);
      var obsResults=(e.data&&e.data.obs_results)||(e.data&&e.data.obs_result?[{text:e.data.obs_result,rtype:''}]:[]);
      if(obsResults.length>0){
        html+='<div class="dfield"><div class="dfield-label">결과</div><div class="dfield-val">';
        obsResults.forEach(function(r){
          if(!r.text) return;
          html+='<div class="detail-result-block">';
          if(r.rtype) html+='<span style="font-size:10px;color:var(--ink-faint);display:block;margin-bottom:3px;">'+esc(r.rtype)+'</span>';
          html+=esc(r.text)+'</div>';
        });
        html+='</div></div>';
      }
    } else if(e.type==='try'){
      var order=(e.data&&e.data.fieldOrder)||'A';
      html+=row('조건',e.data&&e.data.try_condition);
      if(order==='B'){
        html+=row('기대 행동',e.data&&e.data.try_expected);
        html+=row('조건 수정',e.data&&e.data.try_mod);
      } else {
        html+=row('조건 수정',e.data&&e.data.try_mod);
        html+=row('기대 행동',e.data&&e.data.try_expected);
      }
      html+=row('결과',e.data&&e.data.try_result);
      if(e.data&&e.data.tags&&e.data.tags.length>0){
        html+='<div class="dfield"><div class="dfield-label">태그</div><div class="dfield-val"><div class="card-tags">'+e.data.tags.map(function(t){return'<span class="card-tag">'+esc(t)+'</span>';}).join('')+'</div></div></div>';
      }
    }
    return html;
  }

    sec.querySelectorAll('.retry-star-btn').forEach(function(btn){
      btn.addEventListener('click',function(ev){
        ev.stopPropagation();

        var retry=entry.retries.find(function(r){return r.id===rid;});

      });

      fields='<div class="field-group"><div class="field-label">조건 수정 <span style="font-size:10px;color:var(--ink-faint)">(기존: '+esc(e.data&&e.data.try_mod||'')+')</span></div>'+

  document.getElementById('retry-cancel').addEventListener('click',function(){

    editingRetryId=null;
  });

  document.getElementById('retry-save').addEventListener('click',function(){
    var entry=entries.find(function(x){return x.id===viewingId;});
    if(!entry)return;
    if(editingRetryId!==null){
      // 수정 모드
      var retryData={};
      if(entry.type==='try'){
        retryData.mod=(document.getElementById('retry-mod')||{}).value||'';
        retryData.result=(document.getElementById('retry-result')||{}).value||'';
      } else if(entry.type==='obs'){
        retryData.condition=(document.getElementById('retry-cond')||{}).value||'';
        retryData.result=(document.getElementById('retry-result')||{}).value||'';
      }
      if(isLoggedIn){
        fbUpdateRetry(viewingId,editingRetryId,retryData);
      } else {
        var retry=entry.retries.find(function(r){return r.id===editingRetryId;});
        if(retry) Object.assign(retry,retryData);
        renderRetries(entry); autoSave();
      }
      document.getElementById('retry-overlay').classList.remove('open');
      editingRetryId=null;
      return;
    }
    // 새 추가
    var newRetry={createdAt:Date.now()};
    if(entry.type==='try'){
      newRetry.mod=(document.getElementById('retry-mod')||{}).value||'';
      newRetry.result=(document.getElementById('retry-result')||{}).value||'';
    } else if(entry.type==='obs'){
      newRetry.condition=(document.getElementById('retry-cond')||{}).value||'';
      newRetry.result=(document.getElementById('retry-result')||{}).value||'';
    }
    if(isLoggedIn){
      fbAddRetry(viewingId,newRetry);
    } else {
      if(!entry.retries)entry.retries=[];
      newRetry.id=String(idc++);
      entry.retries.push(newRetry);
      renderRetries(entry); autoSave();
    }
    document.getElementById('retry-overlay').classList.remove('open');
  });

    if(btn) btn.classList.add('sel-'+type);
    document.getElementById('fields-find').classList.toggle('hidden',type!=='find');
    document.getElementById('fields-obs').classList.toggle('hidden',type!=='obs');
    document.getElementById('fields-try').classList.toggle('hidden',type!=='try');
    if(type==='try') renderTryMidFields();

    var wrap=document.getElementById('try-field-mid');
    if(!wrap)return;
    var modVal=document.getElementById('try-mod')?document.getElementById('try-mod').value:'';
    var expVal=document.getElementById('try-expected')?document.getElementById('try-expected').value:'';
    if(tryFieldOrder==='A'){
      wrap.innerHTML='<div class="field-group"><div class="field-label">조건 수정</div>'+
        '<input class="field-input" id="try-mod" placeholder="잠깐 멈추고 숨을 쉬면 ..." value="'+modVal.replace(/"/g,'&quot;')+'"/></div>'+
        '<div class="field-group"><div class="field-label">기대 행동</div>'+

      document.getElementById('try-swap-label').textContent='기대 행동 → 조건 수정';
    } else {
      wrap.innerHTML='<div class="field-group"><div class="field-label">기대 행동</div>'+
        '<input class="field-input" id="try-expected" placeholder="덜 무기력해질까? ..." value="'+expVal.replace(/"/g,'&quot;')+'"/></div>'+
        '<div class="field-group"><div class="field-label">조건 수정</div>'+
        '<input class="field-input" id="try-mod" placeholder="잠깐 멈추고 숨을 쉬면 ..." value="'+modVal.replace(/"/g,'&quot;')+'"/></div>';
      document.getElementById('try-swap-label').textContent='조건 수정 → 기대 행동';

    tryFieldOrder=tryFieldOrder==='A'?'B':'A';

  function bindPreview(){
    ['find-subject','find-condition','obs-subject','obs-behavior','obs-condition','try-condition'].forEach(function(id){
      var el=document.getElementById(id);
      if(el) el.addEventListener('input',updatePreview);
    });
  }

  function updatePreview(){
    var title='';
    if(selectedType==='find'){
      var rbTexts=resultBlocks.map(function(r){return r.text.trim();}).filter(Boolean).join(', ');
      var parts=[document.getElementById('find-subject').value.trim(),document.getElementById('find-condition').value.trim(),rbTexts].filter(Boolean);
      title=parts.join(' ');
    } else if(selectedType==='obs'){
      var parts=[document.getElementById('obs-subject').value.trim(),document.getElementById('obs-condition').value.trim(),document.getElementById('obs-period').value.trim(),document.getElementById('obs-behavior').value.trim()].filter(Boolean);
      title=parts.join(' ');
    } else if(selectedType==='try'){
      var cond=document.getElementById('try-condition').value.trim();
      var mod=document.getElementById('try-mod')?document.getElementById('try-mod').value.trim():'';
      var exp=document.getElementById('try-expected')?document.getElementById('try-expected').value.trim():'';
      var parts=[cond];
      if(tryFieldOrder==='B'){parts.push(exp);parts.push(mod);}else{parts.push(mod);parts.push(exp);}
      title=parts.filter(Boolean).join(' ');
    }
    var titleEl=document.getElementById('form-title');
    if(titleEl&&title) titleEl.value=title;
  }

  // 결과 블록
  function renderResultBlocks(){
    var wrap=document.getElementById('result-blocks-wrap');
    if(!wrap)return;
    var html='';
    resultBlocks.forEach(function(rb,idx){
      var rtypeBtns=RTYPES.map(function(rt){
        return '<button class="rtype-btn'+(rb.rtype===rt?' sel':'')+'" data-rbid="'+rb.id+'" data-rtype="'+rt+'">'+rt+'</button>';
      }).join('');
      html+='<div class="result-block" data-rbid="'+rb.id+'">'+
        (resultBlocks.length>1?'<button class="result-block-del" data-rbid="'+rb.id+'">✕</button>':'')+
        '<div class="result-block-num">결과 '+(idx+1)+'</div>'+
        '<input class="field-input rb-text" data-rbid="'+rb.id+'" value="'+rb.text.replace(/"/g,'&quot;')+'" placeholder="행복해진다 / 무기력해진다 ..." style="margin-bottom:8px;"/>'+
        '<div class="result-type-row">'+rtypeBtns+'<button class="rtype-edit-btn" data-rbid="'+rb.id+'" title="타입 편집">✏️</button></div>'+
      '</div>';
    });
    wrap.innerHTML=html;
    wrap.querySelectorAll('.rb-text').forEach(function(inp){
      inp.addEventListener('input',function(){
        var id=parseInt(this.getAttribute('data-rbid'));

        if(rb){rb.text=this.value;updatePreview();}
      });
    });
    wrap.querySelectorAll('.rtype-btn').forEach(function(btn){
      btn.addEventListener('click',function(){
        var id=parseInt(this.getAttribute('data-rbid'));
        var rb=resultBlocks.find(function(r){return r.id===id;});
        if(rb){rb.rtype=this.getAttribute('data-rtype');renderResultBlocks();}
      });
    });
    wrap.querySelectorAll('.result-block-del').forEach(function(btn){
      btn.addEventListener('click',function(){
        var id=parseInt(this.getAttribute('data-rbid'));
        resultBlocks=resultBlocks.filter(function(r){return r.id!==id;});
        renderResultBlocks(); updatePreview();
      });
    });
    wrap.querySelectorAll('.rtype-edit-btn').forEach(function(btn){
      btn.addEventListener('click',function(){
        var row=this.closest('.result-type-row');
        var existing=row.nextSibling;
        if(existing&&existing.classList&&existing.classList.contains('rtype-edit-panel')){existing.remove();return;}
        var panel=buildRtypeEditPanel(function(){renderResultBlocks();renderObsResultBlocks();});
        row.parentNode.insertBefore(panel,row.nextSibling);
      });
    });
  }

  });

  function renderObsResultBlocks(){
    var wrap=document.getElementById('obs-result-blocks-wrap');
    if(!wrap)return;
    var html='';
    obsResultBlocks.forEach(function(rb,idx){
      var rtypeBtns=RTYPES.map(function(rt){
        return '<button class="rtype-btn'+(rb.rtype===rt?' sel':'')+'" data-orbid="'+rb.id+'" data-rtype="'+rt+'">'+rt+'</button>';
      }).join('');
      html+='<div class="result-block" data-orbid="'+rb.id+'">'+
        (obsResultBlocks.length>1?'<button class="obs-result-del" data-orbid="'+rb.id+'">✕</button>':'')+
        '<div class="result-block-num">결과 '+(idx+1)+'</div>'+
        '<input class="field-input orb-text" data-orbid="'+rb.id+'" value="'+rb.text.replace(/"/g,'&quot;')+'" placeholder="관찰 결과를 적어요..." style="margin-bottom:8px;"/>'+
        '<div class="result-type-row">'+rtypeBtns+'<button class="rtype-edit-btn" title="타입 편집">✏️</button></div>'+
      '</div>';
    });
    wrap.innerHTML=html;
    wrap.querySelectorAll('.orb-text').forEach(function(inp){
      inp.addEventListener('input',function(){
        var id=parseInt(this.getAttribute('data-orbid'));
        var rb=obsResultBlocks.find(function(r){return r.id===id;});
        if(rb)rb.text=this.value;
      });
    });
    wrap.querySelectorAll('.rtype-btn').forEach(function(btn){
      btn.addEventListener('click',function(){
        var id=parseInt(this.getAttribute('data-orbid'));
        var rb=obsResultBlocks.find(function(r){return r.id===id;});
        if(rb){rb.rtype=this.getAttribute('data-rtype');renderObsResultBlocks();}
      });
    });
    wrap.querySelectorAll('.obs-result-del').forEach(function(btn){
      btn.addEventListener('click',function(){
        var id=parseInt(this.getAttribute('data-orbid'));
        obsResultBlocks=obsResultBlocks.filter(function(r){return r.id!==id;});
        renderObsResultBlocks();
      });
    });
    wrap.querySelectorAll('.rtype-edit-btn').forEach(function(btn){
      btn.addEventListener('click',function(){
        var row=this.closest('.result-type-row');
        var existing=row.nextSibling;
        if(existing&&existing.classList&&existing.classList.contains('rtype-edit-panel')){existing.remove();return;}
        var panel=buildRtypeEditPanel(function(){renderResultBlocks();renderObsResultBlocks();});
        row.parentNode.insertBefore(panel,row.nextSibling);
      });
    });
  }

  document.getElementById('obs-add-result-btn').addEventListener('click',function(){
    obsResultBlocks.push({id:rbCounter++,text:'',rtype:'기분'});
    renderObsResultBlocks();
  });

  function buildRtypeEditPanel(onUpdate){
    var panel=document.createElement('div');
    panel.className='rtype-edit-panel';
    function renderPanel(){
      var chips=RTYPES.map(function(rt){
        return '<div class="rtype-chip-edit">'+rt+'<button class="rtype-chip-del" data-rt="'+rt+'">✕</button></div>';
      }).join('');
      panel.innerHTML='<div class="rtype-edit-panel-title">타입 편집</div>'+
        '<div class="rtype-chips-edit">'+chips+'</div>'+
        '<div class="rtype-add-row">'+
          '<input class="rtype-add-input" placeholder="새 타입 입력..."/>'+
          '<button class="rtype-add-btn">+ 추가</button>'+
        '</div>';
      panel.querySelectorAll('.rtype-chip-del').forEach(function(btn){
        btn.addEventListener('click',function(){
          var rt=this.getAttribute('data-rt');
          RTYPES=RTYPES.filter(function(r){return r!==rt;});
          if(isLoggedIn)fbSaveMeta();else autoSave();
          onUpdate(); renderPanel();
        });
      });
      panel.querySelector('.rtype-add-btn').addEventListener('click',function(){
        var inp=panel.querySelector('.rtype-add-input');
        var val=inp.value.trim();if(!val)return;
        if(RTYPES.indexOf(val)<0)RTYPES.push(val);
        if(isLoggedIn)fbSaveMeta();else autoSave();
        onUpdate();inp.value='';renderPanel();
      });
      panel.querySelector('.rtype-add-input').addEventListener('keydown',function(e){
        if(e.key==='Enter')panel.querySelector('.rtype-add-btn').click();
      });
    }
    renderPanel();
    return panel;
  }

  // 태그 풀
  function renderFormTagPool(){
    var pool=document.getElementById('form-tag-pool');
    if(!pool)return;
    var html='';
    tagPool.forEach(function(tag){
      var sel=selectedTags.indexOf(tag)>=0;
      html+='<div class="tag-chip'+(sel?' sel':'')+'" data-tag="'+tag+'">'+tag+'</div>';
    });
    pool.innerHTML=html;
    pool.querySelectorAll('.tag-chip').forEach(function(chip){
      chip.addEventListener('click',function(){
        var tag=this.getAttribute('data-tag');
        var idx=selectedTags.indexOf(tag);
        if(idx>=0)selectedTags.splice(idx,1);else selectedTags.push(tag);
        renderFormTagPool();
      });
    });
  }

  function renderTryTagPool(){
    var pool=document.getElementById('try-tag-pool');
    if(!pool)return;
    var html='';
    tagPool.forEach(function(tag){
      var sel=selectedTryTags.indexOf(tag)>=0;
      html+='<div class="tag-chip'+(sel?' sel':'')+'" data-tag="'+tag+'">'+tag+'</div>';
    });
    pool.innerHTML=html;
    pool.querySelectorAll('.tag-chip').forEach(function(chip){
      chip.addEventListener('click',function(){
        var tag=this.getAttribute('data-tag');
        var idx=selectedTryTags.indexOf(tag);
        if(idx>=0)selectedTryTags.splice(idx,1);else selectedTryTags.push(tag);
        renderTryTagPool();
      });
    });
  }

  document.getElementById('tag-add-btn').addEventListener('click',addTag);
  document.getElementById('tag-add-input').addEventListener('keydown',function(e){if(e.key==='Enter')addTag();});
  function addTag(){
    var inp=document.getElementById('tag-add-input');
    var val=inp.value.trim();if(!val)return;
    if(tagPool.indexOf(val)<0)tagPool.push(val);
    if(selectedTags.indexOf(val)<0)selectedTags.push(val);
    inp.value=''; renderFormTagPool();
    if(isLoggedIn)fbSaveMeta();else autoSave();
  }

  document.getElementById('try-tag-add-btn').addEventListener('click',addTryTag);
  document.getElementById('try-tag-add-input').addEventListener('keydown',function(e){if(e.key==='Enter')addTryTag();});
  function addTryTag(){
    var inp=document.getElementById('try-tag-add-input');
    var val=inp.value.trim();if(!val)return;
    if(tagPool.indexOf(val)<0)tagPool.push(val);
    if(selectedTryTags.indexOf(val)<0)selectedTryTags.push(val);
    inp.value=''; renderTryTagPool(); renderFormTagPool();
    if(isLoggedIn)fbSaveMeta();else autoSave();
  }

  function openWriteSheet(editEntry,defaultType){
    editingId=editEntry?editEntry.id:null;
    var type=editEntry?editEntry.type:(defaultType||'find');
    document.getElementById('sheet-title').textContent=editEntry?'기록 수정':'새 기록';
    document.getElementById('type-row').style.display=editEntry?'none':'';
    if(editEntry&&editEntry.type==='try'&&editEntry.data&&editEntry.data.fieldOrder){
      tryFieldOrder=editEntry.data.fieldOrder;
    } else if(!editEntry){ tryFieldOrder='A'; }
    setType(type);
    document.getElementById('form-title').value=editEntry?(editEntry.title||''):'';
    if(editEntry){
      var d=editEntry.data||{};
      if(type==='find'){
        document.getElementById('find-subject').value=d.subject||'나는';
        document.getElementById('find-condition').value=d.condition||'';
        if(d.results&&d.results.length>0){
          resultBlocks=d.results.map(function(r){return{id:rbCounter++,text:r.text||'',rtype:r.rtype||'기분'};});
        } else if(d.behavior){
          resultBlocks=[{id:rbCounter++,text:d.behavior,rtype:d.rtype||'기분'}];
        } else {
          resultBlocks=[{id:rbCounter++,text:'',rtype:'기분'}];
        }
        selectedTags=(d.tags||[]).slice();
        renderResultBlocks(); renderFormTagPool();
      } else if(type==='obs'){
        document.getElementById('obs-subject').value=d.obs_subject||'나는';
        document.getElementById('obs-condition').value=d.obs_condition||'';
        document.getElementById('obs-period').value=d.obs_sub_condition||d.obs_period||'';
        document.getElementById('obs-behavior').value=d.obs_behavior||'';
        if(d.obs_results&&d.obs_results.length>0){
          obsResultBlocks=d.obs_results.map(function(r){return{id:rbCounter++,text:r.text||'',rtype:r.rtype||'기분'};});
        } else if(d.obs_result){
          obsResultBlocks=[{id:rbCounter++,text:d.obs_result,rtype:'기분'}];
        } else {
          obsResultBlocks=[{id:rbCounter++,text:'',rtype:'기분'}];
        }
        renderObsResultBlocks();
      } else if(type==='try'){
        renderTryMidFields();
        document.getElementById('try-condition').value=d.try_condition||'';
        if(document.getElementById('try-mod'))document.getElementById('try-mod').value=d.try_mod||'';
        if(document.getElementById('try-expected'))document.getElementById('try-expected').value=d.try_expected||'';
        document.getElementById('try-result').value=d.try_result||'';
        selectedTryTags=(d.tags||[]).slice();
        renderTryTagPool();
      }
    } else {
      document.getElementById('form-title').value='';
      resultBlocks=[{id:rbCounter++,text:'',rtype:'기분'}];
      obsResultBlocks=[{id:rbCounter++,text:'',rtype:'기분'}];
      selectedTags=[]; selectedTryTags=[];
      renderResultBlocks();renderObsResultBlocks();renderFormTagPool();
      ['find-subject','find-condition','obs-subject','obs-behavior','obs-condition','obs-period','try-condition','try-result'].forEach(function(id){
        var el=document.getElementById(id);if(el)el.value='';
      });
      var fsub=document.getElementById('find-subject');if(fsub)fsub.value='나는';
      var osub=document.getElementById('obs-subject');if(osub)osub.value='나는';
      renderTryMidFields(); renderTryTagPool();
    }
    document.getElementById('write-overlay').classList.add('open');
  }

  document.getElementById('form-cancel').addEventListener('click',function(){
    document.getElementById('write-overlay').classList.remove('open');
  });
  document.getElementById('write-overlay').addEventListener('click',function(e){
    if(e.target===this)this.classList.remove('open');
  });

  document.getElementById('form-save').addEventListener('click',function(){
    var title=document.getElementById('form-title').value.trim();
    if(!title){document.getElementById('form-title').focus();return;}
    var d={};
    if(selectedType==='find'){
      d={subject:document.getElementById('find-subject').value,condition:document.getElementById('find-condition').value,results:resultBlocks.map(function(r){return{text:r.text,rtype:r.rtype};}),tags:selectedTags.slice()};
    } else if(selectedType==='obs'){
      d={obs_subject:document.getElementById('obs-subject').value,obs_condition:document.getElementById('obs-condition').value,obs_sub_condition:document.getElementById('obs-period').value,obs_behavior:document.getElementById('obs-behavior').value,obs_results:obsResultBlocks.map(function(r){return{text:r.text,rtype:r.rtype};})};
    } else if(selectedType==='try'){
      d={try_condition:document.getElementById('try-condition').value.trim(),try_mod:(document.getElementById('try-mod')||{}).value||'',try_expected:(document.getElementById('try-expected')||{}).value||'',try_result:document.getElementById('try-result').value.trim(),tags:selectedTryTags.slice(),fieldOrder:tryFieldOrder};
    }

    document.getElementById('write-overlay').classList.remove('open');

    if(editingId!==null){
      var e=entries.find(function(x){return x.id===editingId;});
      if(e){
        e.title=title; e.data=d;
        if(isLoggedIn){ fbUpdateEntry(editingId,{title:title,data:d}); }
        else { autoSave(); }
      }
      editingId=null; renderList();
    } else {
      var newEntry={type:selectedType,title:title,data:d,createdAt:Date.now(),starred:false,retries:[],comments:[]};
      if(isLoggedIn){
        fbSaveEntry(newEntry);
      } else {
        newEntry.id=String(idc++);
        entries.push(newEntry);
        renderList(); autoSave();
      }
    }
  });

  // ── 초기화 ──
  function init(){
    var fb = window.__fb;

    // 리다이렉트 결과 처리 (iOS PWA 로그인 복귀)
    fb.getRedirectResult(fb.auth).then(function(result){
      // 리다이렉트로 돌아온 케이스 — onAuthStateChanged에서 처리됨
    }).catch(function(e){
      if(e.code==='auth/unauthorized-domain'){
        showToast('이 기기에서는 로그인할 수 없어요');
      } else if(e.code && e.code!=='auth/null-user'){
        console.error('redirect result error:', e);
      }
    });

    // 인증 상태 감시
    fb.onAuthStateChanged(fb.auth, function(user){
      if(user){
        isLoggedIn=true;
        currentUid=user.uid;
        updateAuthUI(user);
        // 마이그레이션 확인 후 동기화 시작
        doMigration(user.uid).then(function(){
          startSync(user.uid);
        });
      } else {
        isLoggedIn=false;
        currentUid=null;
        stopSync();
        updateAuthUI(null);
        setSyncStatus('offline','');
        // 비로그인: 로컬 로드
        autoLoad();
        renderList();
      }
    });

    // 비로그인 초기 렌더 (firebase 응답 전까지)
    autoLoad();
    bindPreview();
    renderTryMidFields();
    renderResultBlocks();
    renderObsResultBlocks();
    renderFormTagPool();
    renderTryTagPool();
    renderList();

    history.replaceState({detail:null},'');

    window.addEventListener('popstate',function(e){
      var dv=document.getElementById('detail-view');
      if(dv.classList.contains('open')){
        stopDetailSync();
        dv.classList.remove('open');
        dv.style.display='none';
        viewingId=null;
        window.scrollTo(0,0);
      }
    });
  }

  // Firebase 준비 후 시작
  if(window.__fb){
    init();
  } else {
    window.addEventListener('firebase-ready', init, {once:true});
  }

})();
</script>
